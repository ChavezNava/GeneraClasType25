<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador Type 25 - Call of Duty Mobile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Pantalla de Login/Registro -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-header">
                <h1>🎮 Type 25 Optimizer</h1>
                <p>Optimiza tu clase al máximo nivel</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Iniciar Sesión</button>
                <button class="auth-tab" data-tab="register">Registrarse</button>
            </div>
            
            <!-- Formulario de Login -->
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="loginEmail" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Iniciar Sesión</button>
            </form>
            
            <!-- Formulario de Registro -->
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label>👤 Nombre de Usuario</label>
                    <input type="text" id="registerName" required placeholder="Tu nombre">
                </div>
                <div class="input-group">
                    <label>📧 Correo Electrónico</label>
                    <input type="email" id="registerEmail" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="input-group">
                    <label>🔒 Confirmar Contraseña</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Registrarse</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Principal (oculto hasta login) -->
    <div id="mainApp" class="container" style="display: none;">
        <header>
            <div class="header-top">
                <div class="visitor-counter">
                    <span class="counter-icon">👁️</span>
                    <span id="visitorCount">0</span>
                    <span>visitas totales</span>
                </div>
                <div class="user-info">
                    <span id="userName">Usuario</span>
                    <button id="logoutBtn" class="logout-btn">🚪 Cerrar Sesión</button>
                </div>
            </div>
            <h1>Optimizador Type 25</h1>
            <p class="subtitle">Selecciona los atributos que quieres mejorar y encuentra la mejor configuración</p>
        </header>
        
        <div class="stats-container">
            <div class="base-stats">
                <h2>Estadísticas Base</h2>
                <div class="stat-row">
                    <span class="stat-name">Daño</span>
                    <span class="stat-value">24</span>
                </div>
                <div class="stat-row">
                    <span class="stat-name">Cadencia</span>
                    <span class="stat-value">86</span>
                </div>
                <div class="stat-row">
                    <span class="stat-name">Precisión</span>
                    <span class="stat-value">44</span>
                </div>
                <div class="stat-row">
                    <span class="stat-name">Movilidad</span>
                    <span class="stat-value">83</span>
                </div>
                <div class="stat-row">
                    <span class="stat-name">Alcance</span>
                    <span class="stat-value">47</span>
                </div>
                <div class="stat-row">
                    <span class="stat-name">Control</span>
                    <span class="stat-value">46</span>
                </div>
            </div>
            
            <div class="attribute-selector">
                <h2>Atributos a Mejorar</h2>
                <div class="attribute-grid">
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="dano" value="dano">
                        <span>Daño</span>
                    </label>
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="cadencia" value="cadencia">
                        <span>Cadencia</span>
                    </label>
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="precision" value="precision">
                        <span>Precisión</span>
                    </label>
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="movilidad" value="movilidad">
                        <span>Movilidad</span>
                    </label>
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="alcance" value="alcance">
                        <span>Alcance</span>
                    </label>
                    <label class="attribute-checkbox">
                        <input type="checkbox" id="control" value="control">
                        <span>Control</span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="buttons">
            <button id="calculate">Calcular Mejores Accesorios</button>
            <button id="clear" class="clear">Limpiar Selección</button>
        </div>
        
        <div class="results" id="results">
            <!-- Los resultados se mostrarán aquí -->
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="counter.js"></script>
    <script src="script.js"></script>
</body>
</html>
